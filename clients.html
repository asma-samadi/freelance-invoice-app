<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clients</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <img class="invoiceLogo" src="./img/invoiceLogo.png" alt="logo" />

      <div class="menu-toggle" id="menu-toggle">☰</div>

      <ul class="ul-navbar">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="clients.html">Clients</a></li>
        <li><a href="invoices.html">Invoices</a></li>
      </ul>
    </nav>

    <!-- Main -->
    <main class="main-clients">
      <h1>Clients Management</h1>
      <p>Manage all your clients.</p>
      <div class="add-client-form">
        <h2>Add client form</h2>
        <form action="">
          <input
            id="name-input-client"
            type="text"
            placeholder="Name"
            required
          />
          <input
            id="email-input-client"
            type="email"
            placeholder="Email"
            required
          />
          <input
            id="company-input-client"
            type="text"
            placeholder="Company"
            required
          />
          <textarea
            id="textarea-input-client"
            placeholder="Notes"
            required
          ></textarea>
          <button id="button-input-client" class="add-clients-button">
            Add Clients
          </button>
        </form>
      </div>
    </main>

    <!-- Section see clients -->
    <section class="section-clients">
      <h2 class="see-clients-h2">See clients</h2>
      <div class="all-clients" id="all-clients"></div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>© 2026 Invoice Flow. All rights reserved.</p>
    </footer>

    <script src="./js/main.js"></script>
    <script type="module" src="./js/clients.js"></script>
  </body>
</html>
