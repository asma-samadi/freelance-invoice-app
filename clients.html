<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clients</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <img class="invoiceLogo" src="./img/invoiceLogo.png" alt="logo" />

      <div class="menu-toggle" id="menu-toggle">☰</div>

      <ul class="ul-navbar">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="clients.html">Clients</a></li>
        <li><a href="invoices.html">Invoices</a></li>
      </ul>
    </nav>

    <!-- Main -->
    <main class="main-clients">
      <h1>Clients Management</h1>
      <p>Manage all your clients.</p>
      <div>
        <h2>Add client form</h2>
        <div class="add-client-form">
          <form action="">
            <input type="text" placeholder="Name" required />
            <input type="email" placeholder="Email" required />
            <input type="text" placeholder="Company" required />
            <input type="text" placeholder="Notes" required />
            <button class="add-clients-button">Add Clients</button>
          </form>
        </div>
      </div>
    </main>

    <!-- Section see clients -->
    <section class="see-clients">
      <h2 class="see-clients-h2">See clients</h2>
      <div class="all-clients">
        <h2 class="name-clients" id="name-clients">Asma</h2>
        <p class="email-clients" id="email-clients">hsijaOJ</p>
        <p class="company-clients" id="company-clients">Microsoft</p>
        <p class="notes-clients" id="notes-clients">You are beautiful</p>
        <button class="edit-client" id="edit-client">Edit</button>
        <button class="delete-client" id="delete-client">Delete</button>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>© 2026 Invoice Flow. All rights reserved.</p>
    </footer>

    <script src="./js/main.js"></script>
  </body>
</html>
